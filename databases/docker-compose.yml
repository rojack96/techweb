services:
  streetcats-fe:
  streetcats-be:
  postgis:
    build: .
    container_name: postgis
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
  minio:

volumes:
  pgdata: